<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hermes Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#0b0d12;--surface:#13161f;--surface2:#1a1e2b;--surface3:#222637;
  --border:#272d40;--accent:#7c6af7;--accent2:#a78bfa;--accent-dim:rgba(124,106,247,.15);
  --user-bg:#1e1854;--user-border:#4c40c0;--agent-bg:#13161f;--agent-border:#272d40;
  --text:#dde1ed;--text2:#7a849a;--text3:#3d4558;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;
  --radius:16px;--radius-sm:10px;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100dvh;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#c084fc);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 18px var(--accent-dim);flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-size:14px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all .3s;flex-shrink:0}
.dot.online{background:var(--green);box-shadow:0 0 7px var(--green)}
.dot.thinking{background:var(--yellow);box-shadow:0 0 7px var(--yellow);animation:blink 1s infinite}
.hdr-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hdr-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--accent)}

/* CONFIG */
.cfg{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}
.cfg input{flex:1;min-width:180px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 10px;outline:none;transition:border-color .2s}
.cfg input:focus{border-color:var(--accent)}
.cfg input::placeholder{color:var(--text3)}
.cfg-btn{padding:6px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.cfg-btn:hover{background:var(--accent2)}
.cfg-btn.ok{background:#166534;color:#bbf7d0}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:16px 12px 8px;display:flex;flex-direction:column;gap:2px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

.row{display:flex;align-items:flex-end;gap:8px;animation:fadeUp .22s ease}
.row.user{flex-direction:row-reverse}
.av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.av.agent{background:linear-gradient(135deg,var(--accent),#c084fc);box-shadow:0 0 8px var(--accent-dim)}
.av.user{background:var(--surface3)}
.col{display:flex;flex-direction:column;gap:3px;max-width:min(74%,500px)}
.row.user .col{align-items:flex-end}
.row.agent .col{align-items:flex-start}
.bubble{padding:9px 13px;border-radius:var(--radius);font-size:13.5px;line-height:1.55;word-break:break-word}
.bubble.agent{background:var(--agent-bg);border:1px solid var(--agent-border);border-bottom-left-radius:3px}
.bubble.user{background:var(--user-bg);border:1px solid var(--user-border);border-bottom-right-radius:3px}
.bubble.agent p{margin-bottom:7px}
.bubble.agent p:last-child{margin-bottom:0}
.bubble.agent code{font-family:var(--mono);font-size:11.5px;background:rgba(124,106,247,.12);padding:1px 5px;border-radius:4px;color:var(--accent2)}
.bubble.agent pre{background:#080a10;border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;overflow-x:auto;margin:7px 0;font-family:var(--mono);font-size:11.5px;line-height:1.5}
.bubble.agent pre code{background:none;padding:0;color:var(--text)}
.bubble.agent ul,.bubble.agent ol{padding-left:18px;margin:5px 0}
.bubble.agent li{margin-bottom:3px}
.bubble.agent strong{color:var(--accent2);font-weight:600}
.bubble.agent h1,.bubble.agent h2,.bubble.agent h3{color:var(--accent2);margin:9px 0 5px;font-weight:600}
.bubble.agent blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--text2);margin:6px 0}
.bubble.agent a{color:var(--accent2);text-decoration:underline}
.ts{font-size:10px;color:var(--text3);padding:0 4px}
.attach-card{display:flex;align-items:center;gap:9px;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;max-width:260px}
.attach-icon{font-size:22px;flex-shrink:0}
.attach-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.preview-img{max-width:240px;border-radius:var(--radius-sm);display:block}
.preview-audio{width:240px;accent-color:var(--accent)}
.preview-video{max-width:280px;border-radius:var(--radius-sm)}
.typing-row{display:flex;align-items:flex-end;gap:8px}
.typing-bub{background:var(--agent-bg);border:1px solid var(--agent-border);border-radius:var(--radius);border-bottom-left-radius:3px;padding:11px 15px;display:flex;align-items:center;gap:5px}
.typing-bub span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce 1.3s ease-in-out infinite;display:block}
.typing-bub span:nth-child(2){animation-delay:.15s}
.typing-bub span:nth-child(3){animation-delay:.3s}
.sys{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;margin:4px 0}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.4;padding:40px;text-align:center}
.empty-icon{font-size:44px}
.empty h2{font-size:18px;font-weight:600}
.empty p{font-size:13px;color:var(--text2);max-width:280px;line-height:1.5}

/* INPUT */
.input-area{padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chip-row:empty{display:none}
.chip{display:flex;align-items:center;gap:5px;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:4px 9px;font-size:11.5px}
.chip-thumb{width:24px;height:24px;border-radius:4px;object-fit:cover}
.chip-name{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-rm{cursor:pointer;color:var(--text3);font-size:13px;transition:color .2s}
.chip-rm:hover{color:var(--red)}
.rec-row{display:none;align-items:center;gap:7px;color:var(--red);font-size:12.5px;font-weight:500;padding:4px 0 8px}
.rec-row.on{display:flex}
.rec-dot{width:9px;height:9px;border-radius:50%;background:var(--red);animation:blink 1s infinite}
.rec-stop{background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:11px;font-family:var(--font)}
.input-row{display:flex;align-items:flex-end;gap:7px}
.attach-group{display:flex;gap:4px;flex-shrink:0}
.ab{width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;flex-shrink:0}
.ab:hover{background:var(--surface2);color:var(--accent);border-color:var(--accent)}
.ab input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.txt-wrap{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:20px;display:flex;align-items:flex-end;padding:6px 6px 6px 13px;transition:border-color .2s}
.txt-wrap:focus-within{border-color:var(--accent)}
#inp{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:13.5px;resize:none;outline:none;max-height:110px;overflow-y:auto;line-height:1.4;padding:3px 0}
#inp::placeholder{color:var(--text3)}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;flex-shrink:0;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:3px}
.send-btn:hover{background:var(--accent2);transform:scale(1.06)}
.send-btn:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed;transform:none}

/* TOAST */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 16px;font-size:12.5px;opacity:0;transition:all .28s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.ok{border-color:var(--green);color:var(--green)}

@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@media(max-width:540px){.col{max-width:86%}.bubble{font-size:13px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">⚕</div>
  <div class="hdr-info">
    <div class="hdr-name">Hermes Agent</div>
    <div class="hdr-sub">
      <div class="dot" id="dot"></div>
      <span id="sub">Not connected</span>
    </div>
  </div>
  <button class="hdr-btn" onclick="newSession()" title="New session">✦</button>
  <button class="hdr-btn" onclick="clearUI()" title="Clear">🗑</button>
</div>

<div class="cfg">
  <input id="sbUrl"  placeholder="Supabase URL: https://xxxx.supabase.co" spellcheck="false"/>
  <input id="sbKey"  placeholder="Supabase anon key" spellcheck="false"/>
  <input id="hfUrl"  placeholder="HF Space URL (for file uploads)" spellcheck="false"/>
  <button class="cfg-btn" id="cfgBtn" onclick="connect()">Connect</button>
</div>

<div class="msgs" id="msgs">
  <div class="empty" id="empty">
    <div class="empty-icon">⚕</div>
    <h2>Hermes Agent</h2>
    <p>Enter your Supabase URL, anon key, and HF Space URL above, then connect.</p>
  </div>
</div>

<div class="input-area">
  <div class="chip-row" id="chipRow"></div>
  <div class="rec-row" id="recRow">
    <div class="rec-dot"></div>
    <span id="recTime">0s</span>
    <button class="rec-stop" onclick="stopRec()">Stop</button>
  </div>
  <div class="input-row">
    <div class="attach-group">
      <label class="ab" title="Attach file">📎<input type="file" accept="*/*" onchange="pickFile(event)"></label>
      <label class="ab" title="Image">🖼️<input type="file" accept="image/*" onchange="pickFile(event)"></label>
      <button class="ab" title="Voice note" onclick="toggleRec()">🎙️</button>
    </div>
    <div class="txt-wrap">
      <textarea id="inp" rows="1" placeholder="Message Hermes…"
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    </div>
    <button class="send-btn" onclick="send()">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let db = null;
let HF_URL = '';
let SESSION_ID = newSid();
let connected = false;
let pendingFile = null;
let mediaRec = null, recChunks = [], recSecs = 0, recTimer = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const s = k => localStorage.getItem(k) || '';
  document.getElementById('sbUrl').value = s('hermes_sb_url');
  document.getElementById('sbKey').value = s('hermes_sb_key');
  document.getElementById('hfUrl').value = s('hermes_hf_url');
});

function newSid() { return 'sid_' + Math.random().toString(36).slice(2, 11); }

// ─── Connect ──────────────────────────────────────────────────────────────────
async function connect() {
  const sbUrl = document.getElementById('sbUrl').value.trim().replace(/\/$/,'');
  const sbKey = document.getElementById('sbKey').value.trim();
  HF_URL      = document.getElementById('hfUrl').value.trim().replace(/\/$/,'');

  if (!sbUrl || !sbKey) { toast('Enter Supabase URL and key', 'err'); return; }

  localStorage.setItem('hermes_sb_url', sbUrl);
  localStorage.setItem('hermes_sb_key', sbKey);
  localStorage.setItem('hermes_hf_url', HF_URL);

  db = supabase.createClient(sbUrl, sbKey);

  // Test connection
  try {
    await db.from('messages').select('id').limit(1);
  } catch(e) {
    toast('Supabase connection failed: ' + e.message, 'err'); return;
  }

  connected = true;
  setStatus('online', 'Connected · Ready');
  document.getElementById('cfgBtn').textContent = 'Connected';
  document.getElementById('cfgBtn').classList.add('ok');
  hideEmpty();
  sysMsg('Session started — Hermes is ready');
  toast('Connected!', 'ok');

  subscribeRealtime();
  loadHistory();
}

// ─── Supabase Realtime ────────────────────────────────────────────────────────
function subscribeRealtime() {
  // New agent messages → display immediately
  db.channel('hermes-messages-' + SESSION_ID)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `session_id=eq.${SESSION_ID}`
    }, payload => {
      const row = payload.new;
      if (row.role === 'agent') addAgentBubble(row.content);
    })
    .subscribe();

  // Agent status → update header indicator
  db.channel('hermes-status-' + SESSION_ID)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'status',
      filter: `session_id=eq.${SESSION_ID}`
    }, payload => {
      const state = payload.new.state;
      if (state === 'thinking') {
        showTyping();
        setStatus('thinking', 'Thinking…');
      } else {
        hideTyping();
        setStatus('online', 'Connected · Ready');
      }
    })
    .subscribe();
}

// ─── Load history ─────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const { data } = await db
      .from('messages')
      .select('*')
      .eq('session_id', SESSION_ID)
      .order('created_at');
    (data || []).forEach(row => {
      if (row.role === 'user') addUserBubble(row.content);
      else addAgentBubble(row.content);
    });
  } catch(e) { console.warn('History load failed:', e); }
}

// ─── Send ─────────────────────────────────────────────────────────────────────
async function send() {
  if (!connected) { toast('Connect first', 'err'); return; }
  const inp  = document.getElementById('inp');
  const text = inp.value.trim();
  const file = pendingFile;
  if (!text && !file) return;

  inp.value = ''; resize(inp);
  pendingFile = null;
  document.getElementById('chipRow').innerHTML = '';

  if (file) {
    // Upload file to HF, which stores in Supabase Storage and writes to inputs table
    if (!HF_URL) { toast('Enter HF Space URL for file uploads', 'err'); return; }
    const fd = new FormData();
    fd.append('file', file);
    if (text) fd.append('text', text);
    showFileUserBubble(file, text);
    try {
      await fetch(`${HF_URL}/upload/${SESSION_ID}`, { method: 'POST', body: fd });
    } catch(e) { toast('Upload failed: ' + e.message, 'err'); }
    return;
  }

  if (text) {
    addUserBubble(text);
    await db.from('inputs').insert({
      session_id: SESSION_ID,
      content: text,
      processed: false
    });
  }
}

// ─── Bubble builders ──────────────────────────────────────────────────────────
function addUserBubble(text) {
  const row = el('div','row user'), av = el('div','av user'); av.textContent = '👤';
  const col = el('div','col');
  const bub = el('div','bubble user'); bub.textContent = text;
  const ts  = el('div','ts'); ts.textContent = now();
  col.append(bub, ts); row.append(col, av);
  msgs().append(row); scrollBottom();
}

function showFileUserBubble(file, text) {
  const row = el('div','row user'), av = el('div','av user'); av.textContent = '👤';
  const col = el('div','col');
  if (file.type.startsWith('image/')) {
    const img = el('img','preview-img');
    img.src = URL.createObjectURL(file);
    col.append(img);
  } else if (file.type.startsWith('audio/')) {
    const a = el('audio','preview-audio');
    a.controls = true; a.src = URL.createObjectURL(file);
    col.append(a);
  } else if (file.type.startsWith('video/')) {
    const v = el('video','preview-video');
    v.controls = true; v.src = URL.createObjectURL(file);
    col.append(v);
  } else {
    const card = el('div','attach-card');
    const ico = el('span','attach-icon'); ico.textContent = fileIcon(file.type, file.name);
    const body = el('div');
    const name = el('div','attach-name'); name.textContent = file.name;
    body.append(name); card.append(ico, body); col.append(card);
  }
  if (text) { const b = el('div','bubble user'); b.textContent = text; col.append(b); }
  const ts = el('div','ts'); ts.textContent = now(); col.append(ts);
  row.append(col, av); msgs().append(row); scrollBottom();
}

function addAgentBubble(text) {
  const row = el('div','row agent'), av = el('div','av agent'); av.textContent = '⚕';
  const col = el('div','col');
  const bub = el('div','bubble agent'); bub.innerHTML = md(text);
  const ts  = el('div','ts'); ts.textContent = now();
  col.append(bub, ts); row.append(av, col);
  msgs().append(row); scrollBottom();
}

// ─── Typing indicator ─────────────────────────────────────────────────────────
let typingEl = null;
function showTyping() {
  if (typingEl) return;
  const row = el('div','typing-row'); row.id = 'typingRow';
  const av  = el('div','av agent'); av.textContent = '⚕';
  const bub = el('div','typing-bub');
  bub.innerHTML = '<span></span><span></span><span></span>';
  row.append(av, bub); msgs().append(row); typingEl = row; scrollBottom();
}
function hideTyping() { if(typingEl){typingEl.remove();typingEl=null;} }

// ─── File picking ─────────────────────────────────────────────────────────────
function pickFile(e) {
  const file = e.target.files[0]; if (!file) return;
  pendingFile = file; showChip(file); e.target.value = '';
}
function showChip(file) {
  const row = document.getElementById('chipRow'); row.innerHTML = '';
  const chip = el('div','chip');
  if (file.type.startsWith('image/')) {
    const img = el('img','chip-thumb'); img.src = URL.createObjectURL(file); chip.append(img);
  } else { const ico = el('span'); ico.textContent = fileIcon(file.type, file.name); chip.append(ico); }
  const name = el('span','chip-name'); name.textContent = file.name;
  const rm = el('span','chip-rm'); rm.textContent = '✕';
  rm.onclick = () => { pendingFile = null; row.innerHTML = ''; };
  chip.append(name, rm); row.append(chip);
}

// ─── Voice recording ──────────────────────────────────────────────────────────
async function toggleRec() {
  if (mediaRec && mediaRec.state === 'recording') { stopRec(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recChunks = []; recSecs = 0;
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRec.onstop = () => {
      const blob = new Blob(recChunks, { type: 'audio/webm' });
      const file = new File([blob], `voice_${Date.now()}.webm`, { type: 'audio/webm' });
      pendingFile = file; showChip(file); stream.getTracks().forEach(t => t.stop());
    };
    mediaRec.start();
    document.getElementById('recRow').classList.add('on');
    recTimer = setInterval(() => {
      recSecs++;
      document.getElementById('recTime').textContent = recSecs + 's';
    }, 1000);
  } catch { toast('Mic access denied', 'err'); }
}
function stopRec() {
  if (mediaRec && mediaRec.state === 'recording') mediaRec.stop();
  clearInterval(recTimer);
  document.getElementById('recRow').classList.remove('on');
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function msgs()      { return document.getElementById('msgs'); }
function scrollBottom(){ const m=msgs(); m.scrollTop=m.scrollHeight; }
function hideEmpty() { const e=document.getElementById('empty'); if(e)e.remove(); }
function sysMsg(t)   { const d=el('div','sys');d.textContent=t;msgs().append(d);scrollBottom(); }
function clearUI()   { msgs().innerHTML=''; }
function newSession(){
  SESSION_ID = newSid(); clearUI();
  if (connected) subscribeRealtime();
  toast('New session','ok');
}
function setStatus(state, txt) {
  document.getElementById('dot').className = 'dot ' +
    (state==='online'?'online':state==='thinking'?'thinking':'');
  document.getElementById('sub').textContent = txt;
}
function now(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function el(tag,cls){ const e=document.createElement(tag); if(cls)e.className=cls; return e; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fileIcon(mime,name){
  if(!mime)mime='';
  if(mime.startsWith('image/'))return'🖼️';
  if(mime.startsWith('audio/'))return'🎵';
  if(mime.startsWith('video/'))return'🎬';
  if(mime==='application/pdf'||(name||'').endsWith('.pdf'))return'📄';
  if(mime.startsWith('text/')||/\.(txt|md|csv|py|js|ts|json|yaml|yml)$/.test(name||''))return'📃';
  return'📎';
}
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function toast(msg,type){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast on'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>{t.className='toast';},3000);
}

// ─── Markdown ─────────────────────────────────────────────────────────────────
function md(raw){
  let s=esc(raw);
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/^---$/gm,'<hr>');
  s=s.replace(/((?:^- .+\n?)+)/gm,m=>'<ul>'+m.replace(/^- (.+)$/gm,'<li>$1</li>')+'</ul>');
  s=s.replace(/((?:^\d+\. .+\n?)+)/gm,m=>'<ol>'+m.replace(/^\d+\. (.+)$/gm,'<li>$1</li>')+'</ol>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.split(/\n\n+/).map(p=>/^<(h[1-3]|ul|ol|pre|hr|blockquote)/.test(p.trim())?p:`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  return s;
}
